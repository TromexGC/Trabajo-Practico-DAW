<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="CSS/reset.css">
    <link rel="stylesheet" href="CSS/layout.css">
    <link rel="stylesheet" href="CSS/display.css">
    <link rel="stylesheet" href="CSS/style.css">

    <link rel="icon" href="Multimedia/icono-pagina.png" type="image/png">
</head>
<body class="login-body">
    <!-- Formulario de inicio de sesión -->
    <header>
        <h1>Placeholder</h1>
    </header>
    <main class="login-page">
        <form id="login-form">
            <div class="form-group">
                <label for="login-username">Nombre de Usuario:</label>
                <input type="text" id="login-username" name="username" required>
            </div>
            <div class="form-group">
                <label for="login-password">Contraseña:</label>
                <input type="password" id="login-password" name="password" required>
            </div>
            <button type="submit">Log In</button>
            <a href="#" id="goToRegister" data-target="register-form" class="form-toggle">¿No tiene una cuenta? Regístrese aquí</a>
            <a href="#" id="goToForgotPassword" data-target="forgot-password-form" class="form-toggle">¿Olvidó su contraseña?</a>
        </form>
        <form id="register-form" class="register-form">
            <div class="form-group">
                <label for="register-email">Correo:</label>
                <input type="email" id="register-email" name="email" required>
            </div>
            <div class="form-group">
                <label for="register-username">Nombre de Usuario:</label>
                <input type="text" id="register-username" name="username" required>
            </div>
            <div class="form-group">
                <label for="register-password">Contraseña:</label>
                <input type="password" id="register-password" name="password" required>
            </div>
            <div class="form-group">
                <label for="register-confirm-password">Repita la contraseña:</label>
                <input type="password" id="register-confirm-password" name="confirm-password" required>
            </div>
            <button type="submit">Register</button>
            <a href="#" id="goToLogin" data-target="login-form" class="form-toggle">¿Ya tiene cuenta? Inicie sesión aquí</a>
        </form>
        <form id="forgot-password-form" class="forgot-password-form">
            <div class="form-group">
                <label for="forgot-email">Correo:</label>
                <input type="email" id="forgot-email" name="email" required>
            </div>
            <button type="submit">Reset Password</button>
            <a href="#" id="goToLoginFromForgot" data-target="login-form" class="form-toggle">¿Recordó su contraseña? Inicie sesión aquí</a>
        </form>
    </main>
    <footer>
        <audio autoplay loop>
            <source src="Multimedia/464954_Bleach___Sad_Piano.mp3" type="audio/mpeg"></audio>
    </footer>

    <script src="Scripts/audio.js" defer></script>
    <script src="Scripts/cambiarForm.js" defer></script>
</body>
</html>
